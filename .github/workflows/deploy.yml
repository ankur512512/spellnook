name: Deploy to production

# Merging staging -> main triggers this. The `production` environment gates the
# deploy behind a manual approval (configure required reviewers in GitHub:
# Settings ▸ Environments ▸ production ▸ Required reviewers).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH to the VM
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy (git pull + build on VM)
        run: >-
          ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new
          "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" 'bash -s' < deploy/deploy.sh
