name: CI

on:
  push:
    branches: [staging, main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: frontend
      - run: npm run build # tsc (strict) + vite build
        working-directory: frontend

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: spellnook
          POSTGRES_PASSWORD: spellnook
          POSTGRES_DB: spellnook
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U spellnook"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://spellnook:spellnook@localhost:5432/spellnook
      PYTHONPATH: .
      # Force a deterministic multiplayer answer (not one of ws_smoke's guesses)
      # so the smoke test can't randomly hit an early win. Test-only.
      SPELLNOOK_TEST_MP_ANSWER: crane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
        working-directory: backend
      - name: Start API
        working-directory: backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do curl -sf localhost:8000/api/health && break; sleep 1; done
      - name: Smoke tests (auth/stats + multiplayer)
        working-directory: backend
        run: |
          python scripts/auth_smoke.py
          python scripts/ws_smoke.py

  images:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - name: Build images (validate Dockerfiles)
        run: |
          docker build -t spellnook-backend ./backend
          docker build -t spellnook-frontend ./frontend
      # To PROMOTE one artifact across environments, publish multi-arch images
      # tagged by commit SHA, then deploy that exact tag to staging then prod:
      #   - uses: docker/setup-qemu-action@v3
      #   - uses: docker/setup-buildx-action@v3
      #   - uses: docker/login-action@v3        # GHCR or Artifact Registry
      #   - uses: docker/build-push-action@v6
      #       with:
      #         platforms: linux/amd64,linux/arm64
      #         tags: ghcr.io/<org>/spellnook-backend:${{ github.sha }}
