# Local development: hot-reload frontend (Vite) + backend (uvicorn --reload).
# Frontend: http://localhost:5173   Backend: http://localhost:8000
services:
  db:
    image: postgres:18-alpine
    environment:
      # Dev-only defaults. In prod, inject via secrets — never commit real creds.
      POSTGRES_USER: spellnook
      POSTGRES_PASSWORD: spellnook
      POSTGRES_DB: spellnook
    volumes:
      # PG18 image uses a single mount here (data lives in a versioned subdir),
      # which keeps future `pg_upgrade --link` within one mount point.
      - db_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spellnook"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      ENVIRONMENT: staging
      DATABASE_URL: postgresql+asyncpg://spellnook:spellnook@db:5432/spellnook
      CORS_ALLOW_ORIGINS: "*"
      # Set these to enable Google sign-in (see docs/AUTH_SETUP.md):
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SPELLNOOK_JWT_SECRET: ${SPELLNOOK_JWT_SECRET:-dev-insecure-secret-change-me}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      - VITE_API_TARGET=http://backend:8000
      # Set to your Google OAuth Client ID to enable the sign-in button:
      - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
